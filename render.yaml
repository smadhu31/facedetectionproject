services:
  - type: web
    name: faceattend
    env: docker
    plan: starter
    disk:
      name: faceattend-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: MATCH_TOLERANCE
        value: "0.5"
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_PATH
        value: /var/data/faceattend.db
      - key: PYTHON_VERSION
        value: 3.11.9